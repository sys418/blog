<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Download List</title>

<style>

:root{
--bg:#e0e5ec;
--shadow-light:#ffffff;
--shadow-dark:#a3b1c6;
--text:#2c2c2c;
--accent:#5c6bc0;
}

  
  .guanyin{  
padding:15px;  
text-align:left;  
font-size:12px;  
max-width:420px;  
margin:auto;  
}  
  
*{
box-sizing:border-box;
font-family:"Poppins",sans-serif;
}

body{
background:var(--bg);
margin:0;
text-align:center;
color:var(--text);
}

/* title */

h1{
margin-top:40px;
color:var(--accent);
font-size:1.3rem;
}

/* container */

.download-list{
display:flex;
flex-direction:column;
align-items:center;
gap:20px;
margin-top:40px;
}

/* button neumorphism */

.download-btn{

width:80%;
max-width:320px;

background:var(--bg);
border-radius:22px;

box-shadow:
8px 8px 16px var(--shadow-dark),
-8px -8px 16px var(--shadow-light);

padding:22px;

text-decoration:none;
color:var(--text);

display:block;
}

.download-btn h3{
margin:5px 0;
color:var(--accent);
}

.download-btn span{
font-size:12px;
opacity:0.7;
}

/* press effect */

.download-btn:active{

box-shadow:
inset 4px 4px 8px var(--shadow-dark),
inset -4px -4px 8px var(--shadow-light);

}

</style>
</head>

<body>

<h1>2026</h1>

  
<div class="guanyin">  <b>Older Version :</b><br>
Size : 6 MB<br>



</div>   
  
  
<div class="download-list">


<a class="download-btn"
href="intent://wwwk.qyshare.com:2083/s/0pqkyd#Intent;scheme=https;end;">
<h3>LINK 1</h3>
<span>APK Download</span>
</a>

<a class="download-btn"
href="intent://guanyinlite.my.id/older.apk#Intent;scheme=https;end;">
<h3>LINK 2</h3>
<span>APK Download</span>
</a>



</div>


</body>
</html>
